<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.6">
        <title>Rating</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="square">
            <div class="round">
                <img src="images/icon-star.svg" alt="" class="star">
            </div>
            <h1> How did we do?</h1>
            <p class="text">
                Please let us know how we did with your <br>
                support request. All feedback is appreciated <br>
                to help us omprove our offering!
            </p>
            <form id="form" action="index2.html" method="POST">
                <label class="container">
                    <input type="radio" name="radio" value="1">
                    <span class="checkmark">1</span>
                </label>
                <label class="container">
                    <input type="radio" name="radio" value="2">
                    <span class="checkmark">2</span>
                </label>
                <label class="container">
                    <input type="radio" name="radio" value="3">
                    <span class="checkmark">3</span>
                </label>
                <label class="container">
                    <input type="radio" name="radio" value="4">
                    <span class="checkmark">4</span>
                </label>
                <label class="container">
                    <input type="radio" name="radio" value="5">
                    <span class="checkmark">5</span>
                </label> 
                <input class="button" type="submit" value="SUBMIT"> 
            </form>

            

            

        </div>
        


        <script src="index.js"></script>
    </body>
</html>
